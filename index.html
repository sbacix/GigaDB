<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WynnFinder Debug Mode</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .bg-green { background-color: #22c55e; shadow: 0 0 10px #22c55e; }
        .bg-red { background-color: #ef4444; }
        .bg-gray { background-color: #64748b; }
        .custom-loader { border-right-color: transparent; animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [dataState, setDataState] = useState({
                api: { status: 'loading', count: 0 },
                drops: { status: 'loading', count: 0 },
                htoi: { status: 'loading', count: 0 }
            });
            
            const [items, setItems] = useState([]);
            const [mergedDrops, setMergedDrops] = useState({});
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState("");
            const [filters, setFilters] = useState({ tier: "All", hasLoc: false });

            useEffect(() => {
                const loadAllData = async () => {
                    let finalItems = [];
                    let finalDrops = {};
                    let statuses = { api: 'error', drops: 'error', htoi: 'error' };

                    // 1. Fetch Wynncraft API
                    try {
                        const res = await fetch("https://api.wynncraft.com/v3/item/database?fullResult");
                        const data = await res.json();
                        // API Structure Check: sometimes it's { items: [] }, sometimes a direct map
                        const rawItems = data.items || data; 
                        finalItems = Object.entries(rawItems).map(([name, stats]) => ({
                            name: stats.name || name,
                            ...stats
                        }));
                        statuses.api = 'success';
                    } catch (e) { console.error("API Error", e); }

                    // 2. Load drops.json
                    try {
                        const res = await fetch("./drops.json");
                        if (res.ok) {
                            const json = await res.json();
                            finalDrops = { ...json };
                            statuses.drops = 'success';
                        }
                    } catch (e) { console.error("drops.json Error", e); }

                    // 3. Load htoi.json
                    try {
                        const res = await fetch("./htoi.json");
                        if (res.ok) {
                            const hArray = await res.json();
                            const categories = ['bossaltar', 'merchant', 'dungeonmerchant', 'quest', 'specialdrop', 'discovery', 'legendaryisland', 'hive', 'raid'];
                            
                            hArray.forEach(entry => {
                                const name = entry.name;
                                const localDrops = [];
                                categories.forEach(cat => {
                                    if (entry[cat] && entry[cat] !== "NULL") {
                                        try {
                                            const parsed = typeof entry[cat] === 'string' ? JSON.parse(entry[cat]) : entry[cat];
                                            const arr = Array.isArray(parsed) ? parsed : [parsed];
                                            arr.forEach(d => localDrops.push({ ...d, type: cat }));
                                        } catch (err) {}
                                    }
                                });
                                if (localDrops.length > 0) {
                                    finalDrops[name] = [...(finalDrops[name] || []), ...localDrops];
                                }
                            });
                            statuses.htoi = 'success';
                        }
                    } catch (e) { console.error("htoi.json Error", e); }

                    setItems(finalItems);
                    setMergedDrops(finalDrops);
                    setDataState({
                        api: { status: statuses.api, count: finalItems.length },
                        drops: { status: statuses.drops, count: Object.keys(finalDrops).length },
                        htoi: { status: statuses.htoi, count: Object.keys(finalDrops).length }
                    });
                    setLoading(false);
                };

                loadAllData();
            }, []);

            const filteredItems = useMemo(() => {
                return items.filter(item => {
                    const nameMatch = item.name.toLowerCase().includes(search.toLowerCase());
                    const tierMatch = filters.tier === "All" || item.tier === filters.tier;
                    const locMatch = !filters.hasLoc || (mergedDrops[item.name] && mergedDrops[item.name].length > 0);
                    return nameMatch && tierMatch && locMatch;
                });
            }, [items, mergedDrops, search, filters]);

            if (loading) return (
                <div className="flex flex-col items-center justify-center min-h-screen">
                    <div className="w-10 h-10 border-4 border-blue-600 rounded-full custom-loader mb-4"></div>
                    <p className="text-slate-500 font-bold text-xs tracking-widest uppercase">Initializing Databases...</p>
                </div>
            );

            return (
                <div className="p-4 md:p-10 max-w-7xl mx-auto">
                    {/* Diagnostic Bar */}
                    <div className="flex flex-wrap gap-4 mb-8 bg-slate-900/50 p-4 rounded-2xl border border-slate-800 text-[10px] font-bold uppercase tracking-wider">
                        <div className="flex items-center">
                            <span className={`status-dot ${dataState.api.status === 'success' ? 'bg-green' : 'bg-red'}`}></span>
                            API: {dataState.api.count} Items
                        </div>
                        <div className="flex items-center">
                            <span className={`status-dot ${dataState.drops.status === 'success' ? 'bg-green' : 'bg-red'}`}></span>
                            Local Drops: {dataState.drops.count} Loaded
                        </div>
                        <div className="flex items-center">
                            <span className={`status-dot ${dataState.htoi.status === 'success' ? 'bg-green' : 'bg-red'}`}></span>
                            SQL Source: Connected
                        </div>
                    </div>

                    <header className="mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
                        <h1 className="text-3xl font-black italic">WYNN<span className="text-blue-500 font-normal">TITLES</span></h1>
                        <div className="flex gap-2 w-full md:w-auto">
                            <input 
                                className="bg-slate-900 border border-slate-800 rounded-xl px-4 py-2 flex-1 md:w-64 outline-none focus:border-blue-500 transition"
                                placeholder="Search items..."
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                            />
                            <select 
                                className="bg-slate-900 border border-slate-800 rounded-xl px-4 py-2 outline-none cursor-pointer"
                                onChange={e => setFilters({...filters, tier: e.target.value})}
                            >
                                <option value="All">All Tiers</option>
                                <option value="Mythic">Mythic</option>
                                <option value="Fabled">Fabled</option>
                                <option value="Legendary">Legendary</option>
                                <option value="Rare">Rare</option>
                            </select>
                            <button 
                                onClick={() => setFilters({...filters, hasLoc: !filters.hasLoc})}
                                className={`px-4 rounded-xl transition ${filters.hasLoc ? 'bg-blue-600' : 'bg-slate-800 text-slate-500'}`}
                            >
                                <i className="fas fa-map-marker-alt"></i>
                            </button>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredItems.slice(0, 50).map((item, idx) => (
                            <div key={idx} className="bg-slate-900/30 border border-slate-800 rounded-3xl p-6 flex flex-col">
                                <h3 className="text-lg font-bold mb-1">{item.name}</h3>
                                <div className="text-[10px] font-black uppercase text-slate-500 mb-4">{item.tier} {item.type}</div>
                                
                                <div className="space-y-2">
                                    {mergedDrops[item.name] ? mergedDrops[item.name].map((d, i) => (
                                        <div key={i} className="bg-slate-900 p-3 rounded-xl border border-slate-800/50 text-xs">
                                            <div className="text-blue-400 font-bold mb-1">{d.name || d.type}</div>
                                            {d.location && <div className="text-slate-400">{d.location}</div>}
                                            {d.coords && <div className="text-emerald-500 font-mono mt-1">X: {d.coords.x} Z: {d.coords.z}</div>}
                                        </div>
                                    )) : <div className="text-[10px] text-slate-700 italic px-2">No location data found</div>}
                                </div>
                            </div>
                        ))}
                    </div>

                    {items.length > 0 && filteredItems.length === 0 && (
                        <div className="text-center py-20 text-slate-600 font-bold uppercase tracking-widest">
                            No items match your search/filters
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
