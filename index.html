<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wynncraft Item & Drop Finder</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .item-card { transition: all 0.2s ease; }
        .item-card:hover { transform: translateY(-4px); border-color: #3b82f6; box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3); }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [wynnItems, setWynnItems] = useState([]);
            const [dropData, setDropData] = useState({});
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState("");
            const [filters, setFilters] = useState({ tier: "All", type: "All", hasCoords: false });

            useEffect(() => {
                const loadData = async () => {
                    try {
                        // 1. Fetch live Wynncraft API
                        const apiRes = await fetch("https://api.wynncraft.com/v3/item/database?fullResult");
                        const apiData = await apiRes.json();
                        const itemArray = Object.entries(apiData).map(([name, stats]) => ({ name, ...stats }));
                        
                        // 2. Fetch your local drops.json file
                        const dropRes = await fetch("./drops.json");
                        const dropJson = await dropRes.json();
                        
                        setWynnItems(itemArray);
                        setDropData(dropJson);
                        setLoading(false);
                    } catch (err) {
                        console.error("Error loading data:", err);
                        setLoading(false);
                    }
                };
                loadData();
            }, []);

            const filteredItems = useMemo(() => {
                return wynnItems.filter(item => {
                    const matchesSearch = item.name.toLowerCase().includes(search.toLowerCase());
                    const matchesTier = filters.tier === "All" || item.tier === filters.tier;
                    const matchesType = filters.type === "All" || item.type === filters.type;
                    
                    const localData = dropData[item.name];
                    const hasCoords = localData?.some(d => d.details?.coords);
                    const matchesCoords = !filters.hasCoords || hasCoords;

                    return matchesSearch && matchesTier && matchesType && matchesCoords;
                });
            }, [wynnItems, dropData, search, filters]);

            if (loading) return (
                <div className="flex flex-col items-center justify-center min-h-screen">
                    <div className="loader ease-linear rounded-full border-4 border-t-4 border-slate-700 h-12 w-12 mb-4"></div>
                    <p className="text-slate-400 animate-pulse">Synchronizing Item Database...</p>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto">
                    {/* Header */}
                    <header className="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h1 className="text-4xl font-black text-white tracking-tight">WYNN<span className="text-blue-500">FINDER</span></h1>
                            <p className="text-slate-400">Database & Drop Coordinate Tracker</p>
                        </div>
                        <div className="flex items-center gap-3 bg-slate-800/50 p-2 rounded-2xl border border-slate-700">
                            <div className="px-4 py-2 bg-slate-900 rounded-xl">
                                <span className="text-blue-400 font-bold">{wynnItems.length}</span> <span className="text-xs text-slate-500 uppercase">Items</span>
                            </div>
                            <div className="px-4 py-2 bg-slate-900 rounded-xl">
                                <span className="text-emerald-400 font-bold">{Object.keys(dropData).length}</span> <span className="text-xs text-slate-500 uppercase">Drop Rules</span>
                            </div>
                        </div>
                    </header>

                    {/* Filter Bar */}
                    <div className="bg-slate-800/80 backdrop-blur-md sticky top-4 z-50 p-4 rounded-3xl border border-slate-700 shadow-2xl mb-8">
                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-4">
                            <div className="lg:col-span-2 relative">
                                <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                                <input 
                                    className="w-full bg-slate-900 border border-slate-700 rounded-2xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-blue-500 outline-none transition"
                                    placeholder="Search item name..."
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                            </div>
                            <select 
                                className="bg-slate-900 border border-slate-700 rounded-2xl p-3 outline-none"
                                onChange={(e) => setFilters({...filters, tier: e.target.value})}
                            >
                                <option value="All">All Tiers</option>
                                <option value="Mythic">Mythic</option>
                                <option value="Fabled">Fabled</option>
                                <option value="Legendary">Legendary</option>
                                <option value="Rare">Rare</option>
                                <option value="Unique">Unique</option>
                            </select>
                            <button 
                                onClick={() => setFilters({...filters, hasCoords: !filters.hasCoords})}
                                className={`rounded-2xl p-3 font-bold transition ${filters.hasCoords ? 'bg-emerald-500 text-white' : 'bg-slate-700 text-slate-400'}`}
                            >
                                <i className="fas fa-map-marker-alt mr-2"></i> Only With Coords
                            </button>
                        </div>
                    </div>

                    {/* Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                        {filteredItems.slice(0, 60).map((item, idx) => (
                            <ItemCard key={idx} item={item} drop={dropData[item.name]} />
                        ))}
                    </div>

                    {filteredItems.length === 0 && (
                        <div className="text-center py-20 bg-slate-800/20 rounded-3xl border-2 border-dashed border-slate-700">
                            <i className="fas fa-ghost text-5xl text-slate-700 mb-4"></i>
                            <p className="text-slate-500">No items found matching your filters.</p>
                        </div>
                    )}
                </div>
            );
        };

        const ItemCard = ({ item, drop }) => {
            const colors = {
                Mythic: "border-purple-500 text-purple-400",
                Fabled: "border-red-500 text-red-400",
                Legendary: "border-blue-500 text-blue-400",
                Rare: "border-pink-500 text-pink-400",
                Unique: "border-yellow-500 text-yellow-500",
                Set: "border-emerald-500 text-emerald-400",
            };

            return (
                <div className={`item-card bg-slate-800/40 border-t-4 rounded-2xl p-5 flex flex-col ${colors[item.tier] || 'border-slate-600'}`}>
                    <div className="mb-4">
                        <div className="flex justify-between items-start">
                            <h2 className="text-xl font-bold text-white leading-tight">{item.name}</h2>
                            <span className="text-xs font-mono bg-slate-900 px-2 py-1 rounded text-slate-400">Lvl {item.level}</span>
                        </div>
                        <p className="text-xs font-bold uppercase tracking-widest opacity-60 mt-1">{item.tier} {item.type}</p>
                    </div>

                    <div className="space-y-3 mt-auto">
                        <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Obtained Via</p>
                        {drop ? drop.map((d, i) => (
                            <div key={i} className="bg-slate-900/80 rounded-xl p-3 border border-slate-700/50">
                                <div className="flex items-center gap-2 mb-1">
                                    <span className="w-2 h-2 rounded-full bg-blue-500"></span>
                                    <span className="text-sm font-bold text-slate-200">{d.name}</span>
                                </div>
                                {d.details?.location && (
                                    <p className="text-xs text-slate-400 ml-4"><i className="fas fa-map-pin mr-1 text-red-500/50"></i> {d.details.location}</p>
                                )}
                                {d.details?.coords && (
                                    <div className="mt-2 ml-4 flex gap-2">
                                        <span className="text-[10px] font-mono bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/30">
                                            X: {d.details.coords.x} Z: {d.details.coords.z}
                                        </span>
                                    </div>
                                )}
                            </div>
                        )) : (
                            <p className="text-xs text-slate-600 italic px-2">Common World Drop / Unknown</p>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
