<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WynnFinder | Ultimate Discovery Engine</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .item-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #1e293b; }
        .item-card:hover { transform: translateY(-4px); border-color: #3b82f6; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 0 20px rgba(59, 130, 246, 0.1); }
        .custom-loader { border-right-color: transparent; animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [items, setItems] = useState([]);
            const [mergedDrops, setMergedDrops] = useState({});
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState("");
            const [filters, setFilters] = useState({ tier: "All", type: "All", hasLocation: false });

            useEffect(() => {
                const initData = async () => {
                    try {
                        // 1. Fetch all sources
                        const [apiRes, dropsRes, htoiRes] = await Promise.all([
                            fetch("https://api.wynncraft.com/v3/item/database?fullResult"),
                            fetch("./drops.json").catch(() => null),
                            fetch("./htoi.json").catch(() => null)
                        ]);

                        const apiData = await apiRes.json();
                        const dropsJson = dropsRes ? await dropsRes.json() : {};
                        const htoiArray = htoiRes ? await htoiRes.json() : [];

                        // 2. Map API items to Array
                        const itemArray = Object.entries(apiData).map(([name, stats]) => ({
                            name,
                            ...stats
                        }));

                        // 3. Process htoi.json (Your 2.5k line array)
                        const processedHtoi = {};
                        htoiArray.forEach(entry => {
                            const itemName = entry.name;
                            const categories = [
                                'bossaltar', 'merchant', 'dungeonmerchant', 'quest', 
                                'specialdrop', 'discovery', 'legendaryisland', 'hive', 'raid'
                            ];
                            
                            const dropsForThisItem = [];
                            categories.forEach(cat => {
                                if (entry[cat] && entry[cat] !== "NULL") {
                                    try {
                                        // Unpack the stringified JSON strings in your file
                                        const parsed = typeof entry[cat] === 'string' ? JSON.parse(entry[cat]) : entry[cat];
                                        const array = Array.isArray(parsed) ? parsed : [parsed];
                                        array.forEach(d => dropsForThisItem.push({ ...d, type: cat }));
                                    } catch (e) { console.error("Parse error for", itemName, cat); }
                                }
                            });
                            if (dropsForThisItem.length > 0) processedHtoi[itemName] = dropsForThisItem;
                        });

                        // 4. Merge drops.json and htoi.json
                        const combined = { ...dropsJson };
                        Object.keys(processedHtoi).forEach(name => {
                            combined[name] = [...(combined[name] || []), ...processedHtoi[name]];
                        });

                        setItems(itemArray);
                        setMergedDrops(combined);
                        setLoading(false);
                    } catch (err) {
                        console.error("Critical Load Error:", err);
                        setLoading(false);
                    }
                };
                initData();
            }, []);

            const filteredItems = useMemo(() => {
                return items.filter(item => {
                    const matchesSearch = item.name.toLowerCase().includes(search.toLowerCase());
                    const matchesTier = filters.tier === "All" || item.tier === filters.tier;
                    const matchesType = filters.type === "All" || item.type === filters.type;
                    const hasLoc = mergedDrops[item.name]?.length > 0;
                    const matchesLoc = !filters.hasLocation || hasLoc;
                    return matchesSearch && matchesTier && matchesType && matchesLoc;
                });
            }, [items, mergedDrops, search, filters]);

            if (loading) return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-[#020617]">
                    <div className="w-16 h-16 border-4 border-blue-500 rounded-full custom-loader mb-4"></div>
                    <p className="text-slate-500 font-bold tracking-[0.3em] text-xs animate-pulse">RECONSTRUCTING WORLD DATA</p>
                </div>
            );

            return (
                <div className="min-h-screen pb-20 px-4 md:px-8 max-w-[1600px] mx-auto">
                    {/* Sticky Header with Search */}
                    <div className="sticky top-0 z-50 pt-8 pb-4 bg-[#020617]">
                        <div className="flex flex-col lg:flex-row gap-6 items-center justify-between mb-8">
                            <div className="text-center lg:text-left">
                                <h1 className="text-4xl font-black tracking-tighter italic">WYNN<span className="text-blue-500 underline decoration-blue-500/30">FINDER</span></h1>
                                <p className="text-slate-500 text-sm font-semibold">Live Database • {Object.keys(mergedDrops).length} Drop Points</p>
                            </div>
                            
                            <div className="glass-panel w-full lg:max-w-4xl p-2 rounded-2xl border border-slate-800 flex flex-col md:flex-row gap-2">
                                <div className="relative flex-1">
                                    <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-600"></i>
                                    <input 
                                        className="w-full bg-slate-900/50 rounded-xl py-3 pl-12 pr-4 outline-none focus:ring-2 focus:ring-blue-500 transition"
                                        placeholder="Search item name..."
                                        value={search}
                                        onChange={(e) => setSearch(e.target.value)}
                                    />
                                </div>
                                <div className="flex gap-2">
                                    <select 
                                        className="bg-slate-900/50 rounded-xl px-4 py-3 outline-none text-sm font-bold border border-slate-800"
                                        onChange={(e) => setFilters({...filters, tier: e.target.value})}
                                    >
                                        <option value="All">All Tiers</option>
                                        <option value="Mythic">Mythic</option>
                                        <option value="Fabled">Fabled</option>
                                        <option value="Legendary">Legendary</option>
                                        <option value="Rare">Rare</option>
                                    </select>
                                    <button 
                                        onClick={() => setFilters({...filters, hasLocation: !filters.hasLocation})}
                                        className={`px-5 rounded-xl font-black text-xs uppercase tracking-widest transition ${filters.hasLocation ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-500'}`}
                                    >
                                        <i className="fas fa-map-marked-alt mr-2"></i> Only Drops
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Main Grid */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        {filteredItems.slice(0, 100).map((item, idx) => (
                            <ItemCard key={idx} item={item} drops={mergedDrops[item.name]} />
                        ))}
                    </div>

                    {filteredItems.length === 0 && (
                        <div className="flex flex-col items-center justify-center py-40 opacity-20">
                            <i className="fas fa-search text-8xl mb-4"></i>
                            <p className="text-2xl font-black italic">NO ITEMS MATCH SEARCH</p>
                        </div>
                    )}
                </div>
            );
        };

        const ItemCard = ({ item, drops }) => {
            const tierStyles = {
                Mythic: "text-purple-400 border-purple-500/30 shadow-[0_0_15px_-5px_rgba(168,85,247,0.2)]",
                Fabled: "text-red-400 border-red-500/30",
                Legendary: "text-blue-400 border-blue-500/30",
                Rare: "text-pink-400 border-pink-500/30",
                Unique: "text-yellow-500 border-yellow-500/30",
                Set: "text-emerald-400 border-emerald-500/30"
            };

            return (
                <div className={`item-card flex flex-col bg-slate-900/20 rounded-3xl p-6 ${tierStyles[item.tier] || 'border-slate-800'}`}>
                    <div className="mb-6 flex justify-between items-start">
                        <div>
                            <h3 className="text-lg font-black text-white leading-none mb-1">{item.name}</h3>
                            <div className="flex items-center gap-2">
                                <span className="text-[10px] font-black px-2 py-0.5 rounded bg-slate-800 text-slate-400 uppercase tracking-tighter">LVL {item.level}</span>
                                <span className={`text-[10px] font-black uppercase tracking-widest opacity-70 ${tierStyles[item.tier]?.split(' ')[0]}`}>{item.tier}</span>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-3 mt-auto">
                        <p className="text-[9px] font-black text-slate-600 uppercase tracking-widest">Sourcing Data</p>
                        {drops ? drops.map((d, i) => (
                            <div key={i} className="bg-slate-900/80 border border-slate-800/50 rounded-2xl p-3">
                                <div className="flex items-center gap-2 mb-1">
                                    <div className={`w-1.5 h-1.5 rounded-full ${d.type === 'specialdrop' ? 'bg-red-500' : 'bg-blue-500'}`}></div>
                                    <span className="text-xs font-bold text-slate-200">{d.name || d.type}</span>
                                </div>
                                
                                {d.location && <p className="text-[11px] text-slate-400 ml-3.5"><i className="fas fa-map-pin mr-1 opacity-50"></i>{d.location}</p>}
                                
                                {d.coords && (
                                    <div className="mt-2 ml-3.5 flex gap-1.5">
                                        <span className="text-[9px] font-mono bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/20">X: {d.coords.x}</span>
                                        <span className="text-[9px] font-mono bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/20">Z: {d.coords.z}</span>
                                    </div>
                                )}
                                
                                {d.price && (
                                    <div className="mt-2 ml-3.5 flex flex-wrap gap-1">
                                        {d.price.map((p, pi) => (
                                            <span key={pi} className="text-[9px] bg-slate-800 px-2 py-0.5 rounded text-slate-300">
                                                {p.quantity} {p.item}
                                            </span>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )) : (
                            <div className="py-4 border-2 border-dashed border-slate-800/50 rounded-2xl text-center">
                                <span className="text-[10px] text-slate-700 font-black uppercase italic tracking-widest">Location Hidden</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
