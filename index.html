<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wynncraft Item & Drop Finder</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .item-card { transition: transform 0.2s ease, border-color 0.2s ease; }
        .item-card:hover { transform: translateY(-2px); border-color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- DATA INTEGRATION ---
        // This is where you put your "Wynntils file" data.
        // I have pre-filled it with the samples you provided.
        const DROP_DATA = {
            "7-Yottabyte Storage Component": [{ "type": "specialdrop", "name": "T-55 Elusive Surveillance Camera", "details": { "description": "Really fast moving small mob...", "location": "South Corkus shore", "screenshots": "https://imgur.com/MSZHN5Y" } }],
            "Abdomen": [{ "type": "dungeonmerchant", "name": "Infested Pit", "details": { "price": [{ "item": "runs", "quantity": "2" }] } }],
            "Acidic Blood": [{ "type": "specialdrop", "name": "Acromantula", "details": { "location": "Cave in Karoc Quarry", "coords": { "x": "-1746", "y": "56", "z": "-4528" }, "screenshots": "https://imgur.com/t9e9fZl" } }],
            "Active Fireball": [{ "type": "specialdrop", "name": "Fire Zombie", "details": { "location": "Emerald Trail", "coords": { "x": "-544", "y": "66", "z": "-1610" } } }],
            "Adventurer's Diary": [{ "type": "specialdrop", "name": "Cursed Adventurer", "details": { "coords": { "x": "-1358", "z": "-5382" } } }],
            "Agullo Beak": [{ "type": "specialdrop", "name": "Agullo's", "details": { "location": "Corkus Beach", "coords": { "x": "-1300", "z": "-2225" } } }]
            // You can paste the rest of your 32,000 lines here inside this object.
        };

        const App = () => {
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [search, setSearch] = useState("");
            const [filters, setFilters] = useState({
                tier: "All",
                type: "All",
                source: "All"
            });

            useEffect(() => {
                fetchItems();
            }, []);

            const fetchItems = async () => {
                try {
                    const response = await fetch("https://api.wynncraft.com/v3/item/database?fullResult");
                    if (!response.ok) throw new Error("Failed to fetch from Wynncraft API");
                    const data = await response.json();
                    
                    // The API returns an object where keys are item names
                    const itemArray = Object.entries(data).map(([name, stats]) => ({
                        name,
                        ...stats
                    }));
                    
                    setItems(itemArray);
                    setLoading(false);
                } catch (err) {
                    setError(err.message);
                    setLoading(false);
                }
            };

            const filteredItems = useMemo(() => {
                return items.filter(item => {
                    const matchesSearch = item.name.toLowerCase().includes(search.toLowerCase());
                    const matchesTier = filters.tier === "All" || item.tier === filters.tier;
                    const matchesType = filters.type === "All" || item.type === filters.type;
                    
                    const hasDropData = DROP_DATA[item.name];
                    const matchesSource = filters.source === "All" || 
                        (filters.source === "Has Location Data" && hasDropData) ||
                        (filters.source === "No Location Data" && !hasDropData);

                    return matchesSearch && matchesTier && matchesType && matchesSource;
                });
            }, [items, search, filters]);

            const tiers = ["All", "Common", "Unique", "Rare", "Legendary", "Fabled", "Mythic", "Set"];
            const types = ["All", "Helmet", "Chestplate", "Leggings", "Boots", "Spear", "Dagger", "Bow", "Wand", "Relik", "Ring", "Bracelet", "Necklace"];

            if (loading) return (
                <div className="flex flex-col items-center justify-center min-h-screen">
                    <div className="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-500 mb-4"></div>
                    <p className="text-xl font-semibold text-slate-400">Loading Wynncraft Items...</p>
                </div>
            );

            if (error) return (
                <div className="flex items-center justify-center min-h-screen p-4 text-center">
                    <div className="bg-red-900/20 border border-red-500 p-8 rounded-2xl max-w-md">
                        <i className="fas fa-exclamation-triangle text-4xl text-red-500 mb-4"></i>
                        <h2 className="text-2xl font-bold mb-2">API Connection Error</h2>
                        <p className="text-slate-400">{error}</p>
                        <button onClick={() => window.location.reload()} className="mt-6 bg-red-500 hover:bg-red-600 px-6 py-2 rounded-lg transition">Retry</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto px-4 py-8">
                    {/* Header */}
                    <div className="mb-12 text-center">
                        <h1 className="text-5xl font-black mb-4 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                            WynnFinder
                        </h1>
                        <p className="text-slate-400 text-lg">Item Database & Mob Location Tracker</p>
                    </div>

                    {/* Search and Filters */}
                    <div className="bg-slate-800/50 p-6 rounded-3xl border border-slate-700 backdrop-blur-sm mb-8 sticky top-4 z-10 shadow-2xl">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div className="md:col-span-2 relative">
                                <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                                <input 
                                    type="text" 
                                    placeholder="Search item name..." 
                                    className="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                            </div>
                            <select 
                                className="bg-slate-900 border border-slate-700 rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                value={filters.tier}
                                onChange={(e) => setFilters({...filters, tier: e.target.value})}
                            >
                                {tiers.map(t => <option key={t} value={t}>{t} Tier</option>)}
                            </select>
                            <select 
                                className="bg-slate-900 border border-slate-700 rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                value={filters.source}
                                onChange={(e) => setFilters({...filters, source: e.target.value})}
                            >
                                <option value="All">All Sources</option>
                                <option value="Has Location Data">Has Mob/Location</option>
                                <option value="No Location Data">Unknown Location</option>
                            </select>
                        </div>
                        <div className="mt-4 flex flex-wrap gap-2">
                            {types.slice(1).map(t => (
                                <button 
                                    key={t}
                                    onClick={() => setFilters({...filters, type: filters.type === t ? "All" : t})}
                                    className={`px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider transition ${filters.type === t ? 'bg-blue-500 text-white' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}
                                >
                                    {t}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Results Count */}
                    <p className="mb-6 text-slate-500 font-medium">
                        Showing {filteredItems.length} items
                    </p>

                    {/* Item Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredItems.slice(0, 100).map((item, idx) => (
                            <ItemCard key={idx} item={item} dropInfo={DROP_DATA[item.name]} />
                        ))}
                    </div>
                    
                    {filteredItems.length > 100 && (
                        <div className="mt-12 text-center p-8 bg-slate-800/30 rounded-2xl border border-dashed border-slate-700">
                            <p className="text-slate-500">Showing first 100 results. Refine your search to find specific items.</p>
                        </div>
                    )}
                </div>
            );
        };

        const ItemCard = ({ item, dropInfo }) => {
            const tierColors = {
                "Common": "border-slate-500 text-slate-400",
                "Unique": "border-yellow-600 text-yellow-500",
                "Rare": "border-pink-500 text-pink-400",
                "Legendary": "border-blue-400 text-blue-300",
                "Fabled": "border-red-500 text-red-400",
                "Mythic": "border-purple-500 text-purple-400",
                "Set": "border-emerald-500 text-emerald-400"
            };

            return (
                <div className={`item-card bg-slate-800/40 rounded-2xl border-l-4 p-5 flex flex-col h-full ${tierColors[item.tier] || 'border-slate-700 text-slate-300'}`}>
                    <div className="flex justify-between items-start mb-4">
                        <div>
                            <h3 className="text-xl font-bold text-white leading-tight">{item.name}</h3>
                            <span className="text-xs font-bold uppercase tracking-tighter opacity-70">
                                Lvl {item.level || 1} • {item.tier} {item.type}
                            </span>
                        </div>
                    </div>

                    {/* Stats Summary */}
                    <div className="grid grid-cols-2 gap-2 mb-4 text-sm text-slate-300">
                        {item.damage && <div className="bg-slate-900/50 rounded-lg p-2"><i className="fas fa-swords mr-2 text-red-400"></i>{item.damage}</div>}
                        {item.health > 0 && <div className="bg-slate-900/50 rounded-lg p-2"><i className="fas fa-heart mr-2 text-emerald-400"></i>{item.health} HP</div>}
                    </div>

                    {/* Drop Location Info */}
                    <div className="mt-auto pt-4 border-t border-slate-700/50">
                        <p className="text-xs font-bold text-slate-500 uppercase mb-2">Source / Location</p>
                        {dropInfo ? (
                            dropInfo.map((drop, i) => (
                                <div key={i} className="bg-blue-500/10 border border-blue-500/20 rounded-xl p-3 mb-2">
                                    <div className="flex items-center text-blue-300 font-bold text-sm mb-1">
                                        <i className="fas fa-skull-crossbones mr-2"></i>
                                        {drop.name}
                                    </div>
                                    {drop.details?.location && (
                                        <div className="text-xs text-slate-400 flex items-start">
                                            <i className="fas fa-map-marker-alt mr-2 mt-0.5 text-red-400"></i>
                                            {drop.details.location}
                                        </div>
                                    )}
                                    {drop.details?.coords && (
                                        <div className="text-xs font-mono text-emerald-400 mt-1 bg-slate-900 px-2 py-1 rounded inline-block">
                                            X: {drop.details.coords.x} | Z: {drop.details.coords.z}
                                        </div>
                                    )}
                                </div>
                            ))
                        ) : (
                            <div className="text-xs text-slate-500 italic">
                                Location unknown (World Drop)
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
